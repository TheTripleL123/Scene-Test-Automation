<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scene Test Automation</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; max-width: 95%; margin: 0 auto; padding: 32px; background: #0d1117; color: #e6edf3; font-size: 16px; }
    h1 { margin-bottom: 6px; color: #f0f6fc; font-size: 1.8em; padding-bottom: 12px; border-bottom: 2px solid #30363d; }
    .subtitle { color: #7d8590; margin-bottom: 28px; font-size: 1em; margin-top: 8px; }

    .run { background: #161b22; border: 1px solid #30363d; border-radius: 10px; padding: 20px 24px; margin-bottom: 14px; display: flex; justify-content: space-between; align-items: center; gap: 24px; flex-wrap: wrap; }
    .run-left { flex: 1; min-width: 0; }
    .run-title { font-weight: 700; font-size: 1.15em; color: #f0f6fc; margin-bottom: 10px; }
    .files { display: flex; gap: 10px; flex-wrap: wrap; }
    .file-link { display: inline-block; padding: 6px 14px; background: #1c2333; border: 1px solid #3b4c6b; border-radius: 6px; color: #79c0ff; text-decoration: none; font-size: 0.9em; cursor: pointer; }
    .file-link:hover { background: #2d3a54; }
    .file-link.drive { background: #122117; border-color: #2ea04f; color: #56d364; }
    .file-link.drive:hover { background: #1a3326; }

    .gpu-box { background: #1c2333; border: 1px solid #3b4c6b; border-radius: 8px; padding: 20px 32px; text-align: center; flex-shrink: 0; min-width: 180px; }
    .gpu-label { font-size: 0.85em; color: #7d8590; margin-bottom: 6px; letter-spacing: 0.05em; }
    .gpu-value { font-family: monospace; font-size: 2.6em; color: #79c0ff; font-weight: 700; }

    .loading { color: #7d8590; padding: 40px 0; text-align: center; font-size: 1em; }
    .error { color: #f85149; padding: 16px; background: #2d1215; border: 1px solid #f8514933; border-radius: 8px; font-size: 0.9em; }
    .empty { color: #7d8590; padding: 30px 0; text-align: center; font-style: italic; }

    /* Popup overlay */
    .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1000; justify-content: center; align-items: center; cursor: pointer; }
    .overlay.active { display: flex; }
    .overlay img { max-width: 90%; max-height: 90%; border-radius: 8px; cursor: default; }
    .overlay-close { position: fixed; top: 20px; right: 30px; color: #fff; font-size: 2em; cursor: pointer; z-index: 1001; }

    .delete-btn { background: none; border: none; color: #7d8590; font-size: 2.2em; cursor: pointer; padding: 0; width: 56px; height: 56px; display: flex; align-items: center; justify-content: center; border-radius: 8px; transition: color 0.2s, background 0.2s; flex-shrink: 0; }
    .delete-btn:hover { color: #ff6b6b; background: #4a1a1a; }

    /* Confirm popup */
    .confirm-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 2000; justify-content: center; align-items: center; }
    .confirm-overlay.active { display: flex; }
    .confirm-box { background: #161b22; border: 1px solid #30363d; border-radius: 10px; padding: 28px 32px; text-align: center; max-width: 420px; }
    .confirm-box p { margin-bottom: 8px; font-size: 1.05em; color: #e6edf3; }
    .confirm-box .confirm-name { font-weight: 600; color: #f85149; word-break: break-all; margin-bottom: 20px; font-size: 0.9em; }
    .confirm-buttons { display: flex; gap: 12px; justify-content: center; }
    .confirm-buttons button { padding: 8px 24px; border-radius: 6px; border: none; font-size: 0.95em; cursor: pointer; font-weight: 600; }
    .btn-cancel { background: #30363d; color: #e6edf3; }
    .btn-cancel:hover { background: #484f58; }
    .btn-delete { background: #da3633; color: #fff; }
    .btn-delete:hover { background: #f85149; }

    @media (max-width: 700px) {
      .run { flex-direction: column; align-items: flex-start; }
      .gpu-box { width: 100%; }
    }
  </style>
</head>
<body>
  <h1>Scene Test Automation</h1>
  <p class="subtitle">Test results dashboard — <a href="https://drive.google.com/drive/u/5/folders/1Ckhix2o8tbz3VA6i25UQ1jf7JKx5bkQD" target="_blank" style="color: #79c0ff; text-decoration: none;">📂 Google Drive Folder</a></p>
  <div id="content"><p class="loading">Loading...</p></div>

  <!-- Image popup -->
  <div class="overlay" id="overlay" onclick="closePopup()">
    <span class="overlay-close" onclick="closePopup()">&times;</span>
    <img id="popup-img" src="" alt="Graph" onclick="event.stopPropagation()">
  </div>

  <script>
    const REPO_OWNER = "TheTripleL123";
    const REPO_NAME = "Scene-Test-Automation";
    const BRANCH = "main";

    const API_BASE = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents`;
    const RAW = `https://raw.githubusercontent.com/${REPO_OWNER}/${REPO_NAME}/${BRANCH}`;

    function openPopup(url) {
      document.getElementById("popup-img").src = url;
      document.getElementById("overlay").classList.add("active");
    }

    function closePopup() {
      document.getElementById("overlay").classList.remove("active");
      document.getElementById("popup-img").src = "";
    }

    document.addEventListener("keydown", function(e) {
      if (e.key === "Escape") closePopup();
    });

    // --- Auth ---
    // Token is NOT stored in the repo. User enters it once per session to enable delete.
    let GITHUB_TOKEN = sessionStorage.getItem("gh_token") || "";
    function getAuthHeaders() {
      return GITHUB_TOKEN ? {
        "Authorization": `Bearer ${GITHUB_TOKEN}`,
        "Accept": "application/vnd.github+json"
      } : null;
    }

    let pendingDeleteFolder = null;

    function askDelete(folderName) {
      if (!GITHUB_TOKEN) {
        alert("Delete is not enabled. Add your GitHub token to index.html to enable it.");
        return;
      }
      pendingDeleteFolder = folderName;
      document.getElementById("confirmName").textContent = folderName;
      document.getElementById("confirmOverlay").classList.add("active");
    }

    function cancelDelete() {
      pendingDeleteFolder = null;
      document.getElementById("confirmOverlay").classList.remove("active");
    }

    async function confirmDelete() {
      if (!pendingDeleteFolder) return;
      const folderName = pendingDeleteFolder;
      cancelDelete();

      try {
        const encoded = encodeURIComponent(folderName);
        // Get all files in the folder — use auth headers
        const res = await fetch(`${API_BASE}/AllTestRuns/${encoded}?ref=${BRANCH}`, {
          headers: AUTH_HEADERS
        });
        if (!res.ok) throw new Error("Could not list folder contents (" + res.status + ")");
        const files = await res.json();

        // Delete each file one by one
        for (const file of files) {
          const delRes = await fetch(`${API_BASE}/AllTestRuns/${encoded}/${encodeURIComponent(file.name)}`, {
            method: "DELETE",
            headers: { ...AUTH_HEADERS, "Content-Type": "application/json" },
            body: JSON.stringify({
              message: `Delete ${folderName}/${file.name}`,
              sha: file.sha,
              branch: BRANCH
            })
          });
          if (!delRes.ok) {
            const errBody = await delRes.text();
            throw new Error(`Failed to delete ${file.name}: ${delRes.status} ${errBody}`);
          }
        }

        // Reload
        load();
      } catch (err) {
        alert("Delete failed: " + err.message);
      }
    }

    function forceDownload(url, filename) {
      fetch(url)
        .then(res => res.blob())
        .then(blob => {
          const a = document.createElement("a");
          a.href = URL.createObjectURL(blob);
          a.download = filename;
          a.click();
          URL.revokeObjectURL(a.href);
        })
        .catch(err => alert("Download failed: " + err.message));
    }

    async function load() {
      const container = document.getElementById("content");

      try {
        const res = await fetch(`${API_BASE}/AllTestRuns?ref=${BRANCH}`);
        if (res.status === 404) {
          container.innerHTML = '<p class="empty">No test runs yet.</p>';
          return;
        }
        if (!res.ok) throw new Error(`API returned ${res.status}`);
        const items = await res.json();

        const folders = items.filter(item => item.type === "dir");
        // Reverse to show newest first (GitHub API returns oldest first)
        folders.reverse();

        if (folders.length === 0) {
          container.innerHTML = '<p class="empty">No test runs yet.</p>';
          return;
        }

        let html = "";
        for (const folder of folders) {
          const filesRes = await fetch(folder.url);
          const files = await filesRes.json();

          // Load metadata.json from the folder
          let avgGpu = "—";
          let driveLink = null;
          try {
            const metaRes = await fetch(`${RAW}/AllTestRuns/${encodeURIComponent(folder.name)}/metadata.json?t=${Date.now()}`);
            if (metaRes.ok) {
              const meta = JSON.parse((await metaRes.text()).trim());
              avgGpu = meta.avg_gpu || "—";
              driveLink = meta.drive_link || null;
            }
          } catch (e) {}

          html += `<div class="run">`;
          html += `<div class="run-left">`;
          html += `<div class="run-title">${folder.name}</div>`;
          html += `<div class="files">`;

          for (const file of files) {
            const rawUrl = `${RAW}/AllTestRuns/${encodeURIComponent(folder.name)}/${file.name}`;
            if (file.name.endsWith(".csv")) {
              html += `<a class="file-link" href="#" onclick="forceDownload('${rawUrl}', '${file.name}'); return false;">📊 CSV Report</a>`;
            } else if (file.name.endsWith(".png")) {
              html += `<a class="file-link" href="#" onclick="openPopup('${rawUrl}'); return false;">🖼️ GPU Graph</a>`;
            }
          }
          if (driveLink) {
            html += `<a class="file-link drive" href="${driveLink}" target="_blank">📂 Drive Folder</a>`;
          }
          html += `</div>`;
          html += `</div>`;

          html += `<div class="gpu-box">`;
          html += `<div class="gpu-label">AVERAGE GPU</div>`;
          html += `<div class="gpu-value">${avgGpu}</div>`;
          html += `</div>`;

          html += `</div>`;
        }

        container.innerHTML = html;
      } catch (err) {
        container.innerHTML = `<div class="error">Failed to load: ${err.message}</div>`;
      }
    }

    load();
  </script>
</body>
</html>
