<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scene Test Automation</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; max-width: 95%; margin: 0 auto; padding: 24px; background: #0d1117; color: #e6edf3; }
    h1 { margin-bottom: 8px; color: #f0f6fc; }
    .subtitle { color: #7d8590; margin-bottom: 24px; }

    .header-row { display: flex; gap: 24px; margin-bottom: 12px; }
    .header-row h2 { font-size: 1.15em; padding-bottom: 8px; border-bottom: 2px solid #30363d; }
    .col-left { flex: 1; min-width: 0; }
    .col-right { width: 280px; flex-shrink: 0; }

    .row { display: flex; gap: 24px; margin-bottom: 10px; align-items: center; }
    .run { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 14px 18px; flex: 1; min-width: 0; }
    .run-header { font-weight: 600; margin-bottom: 8px; color: #f0f6fc; }
    .files { display: flex; gap: 8px; flex-wrap: wrap; }
    .file-link { display: inline-block; padding: 5px 12px; background: #1c2333; border: 1px solid #3b4c6b; border-radius: 6px; color: #79c0ff; text-decoration: none; font-size: 0.85em; }
    .file-link:hover { background: #2d3a54; }
    .file-link.drive { background: #122117; border-color: #2ea04f; color: #56d364; }
    .file-link.drive:hover { background: #1a3326; }
    .preview { max-width: 220px; margin-top: 8px; border-radius: 4px; border: 1px solid #30363d; }

    .summary-box { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 10px 16px; width: 280px; flex-shrink: 0; display: flex; justify-content: space-between; align-items: center; gap: 12px; }
    .summary-gpu { font-family: monospace; font-size: 1em; color: #79c0ff; font-weight: 600; white-space: nowrap; }

    .loading { color: #7d8590; padding: 30px 0; text-align: center; }
    .error { color: #f85149; padding: 16px; background: #2d1215; border: 1px solid #f8514933; border-radius: 8px; font-size: 0.9em; }
    .empty { color: #7d8590; padding: 20px 0; text-align: center; font-style: italic; }
    @media (max-width: 700px) {
      .header-row, .row { flex-direction: column; }
      .col-right, .summary-box { width: 100%; }
    }
  </style>
</head>
<body>
  <h1>Scene Test Automation</h1>
  <p class="subtitle">Test results dashboard</p>

  <div class="header-row">
    <h2 class="col-left">📁 Test Runs</h2>
    <h2 class="col-right">📊 GPU Summary</h2>
  </div>
  <div id="content"><p class="loading">Loading...</p></div>

  <script>
    const REPO_OWNER = "TheTripleL123";
    const REPO_NAME = "Scene-Test-Automation";
    const BRANCH = "main";

    const API_BASE = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents`;
    const RAW = `https://raw.githubusercontent.com/${REPO_OWNER}/${REPO_NAME}/${BRANCH}`;

    function forceDownload(url, filename) {
      fetch(url)
        .then(res => res.blob())
        .then(blob => {
          const a = document.createElement("a");
          a.href = URL.createObjectURL(blob);
          a.download = filename;
          a.click();
          URL.revokeObjectURL(a.href);
        })
        .catch(err => alert("Download failed: " + err.message));
    }

    async function load() {
      const container = document.getElementById("content");

      // Load summary
      let summaryEntries = [];
      try {
        const sRes = await fetch(`${RAW}/summary.json?t=${Date.now()}`);
        if (sRes.ok) {
          const text = await sRes.text();
          const trimmed = text.trim();
          if (trimmed && trimmed !== "[]") {
            summaryEntries = JSON.parse(trimmed);
          }
        }
      } catch (e) {}

      // Load run folders
      try {
        const res = await fetch(`${API_BASE}/AllTestRuns?ref=${BRANCH}`);
        if (res.status === 404) {
          container.innerHTML = '<p class="empty">No test runs yet.</p>';
          return;
        }
        if (!res.ok) throw new Error(`API returned ${res.status}`);
        const items = await res.json();

        const folders = items.filter(item => item.type === "dir");
        folders.sort((a, b) => b.name.localeCompare(a.name));

        if (folders.length === 0) {
          container.innerHTML = '<p class="empty">No test runs yet.</p>';
          return;
        }

        let html = "";
        for (const folder of folders) {
          const filesRes = await fetch(folder.url);
          const files = await filesRes.json();

          const summaryEntry = summaryEntries.find(e => e.name === folder.name);
          const driveLink = summaryEntry ? summaryEntry.drive_link : null;
          const avgGpu = summaryEntry ? summaryEntry.avg_gpu : "—";

          html += `<div class="row">`;

          // Left: test run
          html += `<div class="run">`;
          html += `<div class="run-header">${folder.name}</div>`;
          html += `<div class="files">`;

          let pngUrl = null;
          for (const file of files) {
            const rawUrl = `${RAW}/AllTestRuns/${encodeURIComponent(folder.name)}/${file.name}`;
            if (file.name.endsWith(".csv")) {
              html += `<a class="file-link" href="#" onclick="forceDownload('${rawUrl}', '${file.name}'); return false;">📊 CSV</a>`;
            } else if (file.name.endsWith(".png")) {
              pngUrl = rawUrl;
              html += `<a class="file-link" href="${rawUrl}" target="_blank">🖼️ Graph</a>`;
            }
          }
          if (driveLink) {
            html += `<a class="file-link drive" href="${driveLink}" target="_blank">🎬 Recording</a>`;
          }
          html += `</div>`;
          if (pngUrl) {
            html += `<img class="preview" src="${pngUrl}" alt="Graph" loading="lazy">`;
          }
          html += `</div>`;

          // Right: GPU summary
          html += `<div class="summary-box">`;
          html += `<span>Avg GPU</span>`;
          html += `<span class="summary-gpu">${avgGpu}</span>`;
          html += `</div>`;

          html += `</div>`;
        }

        container.innerHTML = html;
      } catch (err) {
        container.innerHTML = `<div class="error">Failed to load: ${err.message}</div>`;
      }
    }

    load();
  </script>
</body>
</html>
