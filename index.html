<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scene Test Automation</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; max-width: 1000px; margin: 0 auto; padding: 24px; background: #f5f5f5; color: #333; }
    h1 { margin-bottom: 8px; }
    .subtitle { color: #888; margin-bottom: 24px; }
    .columns { display: flex; gap: 24px; align-items: flex-start; }
    .column { flex: 1; min-width: 0; }
    h2 { font-size: 1.15em; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 2px solid #ddd; }
    .run { background: #fff; border: 1px solid #ddd; border-radius: 8px; padding: 14px 18px; margin-bottom: 10px; }
    .run-header { font-weight: 600; margin-bottom: 8px; color: #111; }
    .files { display: flex; gap: 8px; flex-wrap: wrap; }
    .file-link { display: inline-block; padding: 5px 12px; background: #eef2ff; border: 1px solid #c7d2fe; border-radius: 6px; color: #4338ca; text-decoration: none; font-size: 0.85em; }
    .file-link:hover { background: #c7d2fe; }
    .file-link.drive { background: #f0fdf4; border-color: #86efac; color: #166534; }
    .file-link.drive:hover { background: #bbf7d0; }
    .preview { max-width: 220px; margin-top: 8px; border-radius: 4px; border: 1px solid #ddd; }
    .summary-item { background: #fff; border: 1px solid #ddd; border-radius: 8px; padding: 10px 16px; margin-bottom: 6px; display: flex; justify-content: space-between; align-items: center; }
    .summary-name { font-weight: 500; color: #111; }
    .summary-gpu { font-family: monospace; font-size: 0.95em; color: #2563eb; font-weight: 600; }
    .loading { color: #999; padding: 30px 0; text-align: center; }
    .error { color: #dc2626; padding: 16px; background: #fef2f2; border-radius: 8px; font-size: 0.9em; }
    .empty { color: #999; padding: 20px 0; text-align: center; font-style: italic; }
    @media (max-width: 700px) { .columns { flex-direction: column; } }
  </style>
</head>
<body>
  <h1>Scene Test Automation</h1>
  <p class="subtitle">Test results dashboard</p>

  <div class="columns">
    <div class="column">
      <h2>📁 Test Runs</h2>
      <div id="runs"><p class="loading">Loading runs...</p></div>
    </div>
    <div class="column">
      <h2>📊 GPU Summary</h2>
      <div id="summary"><p class="loading">Loading summary...</p></div>
    </div>
  </div>

  <script>
    const REPO_OWNER = "TheTripleL123";
    const REPO_NAME = "Scene-Test-Automation";
    const BRANCH = "main";

    const API_BASE = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents`;
    const RAW = `https://raw.githubusercontent.com/${REPO_OWNER}/${REPO_NAME}/${BRANCH}`;

    async function loadRuns() {
      const container = document.getElementById("runs");
      try {
        const res = await fetch(`${API_BASE}/AllTestRuns?ref=${BRANCH}`);
        if (res.status === 404) {
          container.innerHTML = '<p class="empty">No test runs yet.</p>';
          return;
        }
        if (!res.ok) throw new Error(`API returned ${res.status}`);
        const items = await res.json();

        const folders = items.filter(item => item.type === "dir");
        folders.sort((a, b) => b.name.localeCompare(a.name));

        if (folders.length === 0) {
          container.innerHTML = '<p class="empty">No test runs yet.</p>';
          return;
        }

        // Load summary to get Drive links
        let summaryEntries = [];
        try {
          const sRes = await fetch(`${RAW}/summary.json?t=${Date.now()}`);
          if (sRes.ok) {
            const text = await sRes.text();
            const trimmed = text.trim();
            if (trimmed && trimmed !== "[]") {
              summaryEntries = JSON.parse(trimmed);
            }
          }
        } catch (e) {}

        let html = "";
        for (const folder of folders) {
          const filesRes = await fetch(folder.url);
          const files = await filesRes.json();

          // Find matching summary entry for Drive link
          const summaryEntry = summaryEntries.find(e => e.name === folder.name);
          const driveLink = summaryEntry ? summaryEntry.drive_link : null;

          html += `<div class="run">`;
          html += `<div class="run-header">${folder.name}</div>`;
          html += `<div class="files">`;

          let pngUrl = null;
          for (const file of files) {
            const rawUrl = `${RAW}/AllTestRuns/${encodeURIComponent(folder.name)}/${file.name}`;

            if (file.name.endsWith(".csv")) {
              // CSV: download link
              html += `<a class="file-link" href="${rawUrl}" download="${file.name}">📊 CSV</a>`;
            } else if (file.name.endsWith(".png")) {
              // PNG: open in new tab
              pngUrl = rawUrl;
              html += `<a class="file-link" href="${rawUrl}" target="_blank">🖼️ Graph</a>`;
            }
          }

          // MP4: link to Google Drive
          if (driveLink) {
            html += `<a class="file-link drive" href="${driveLink}" target="_blank">🎬 Recording (Drive)</a>`;
          }

          html += `</div>`;
          if (pngUrl) {
            html += `<img class="preview" src="${pngUrl}" alt="Graph" loading="lazy">`;
          }
          html += `</div>`;
        }
        container.innerHTML = html;
      } catch (err) {
        container.innerHTML = `<div class="error">Failed to load runs: ${err.message}</div>`;
      }
    }

    async function loadSummary() {
      const container = document.getElementById("summary");
      try {
        const res = await fetch(`${RAW}/summary.json?t=${Date.now()}`);
        if (!res.ok) throw new Error(`Could not load summary.json (${res.status})`);
        const text = await res.text();
        const trimmed = text.trim();

        if (!trimmed || trimmed === "[]") {
          container.innerHTML = '<p class="empty">No entries yet.</p>';
          return;
        }

        const entries = JSON.parse(trimmed);

        const reversed = [...entries].reverse();
        let html = "";
        for (const entry of reversed) {
          html += `<div class="summary-item">`;
          html += `<span class="summary-name">${entry.name}</span>`;
          html += `<span class="summary-gpu">${entry.avg_gpu}</span>`;
          html += `</div>`;
        }
        container.innerHTML = html;
      } catch (err) {
        container.innerHTML = `<div class="error">Failed to load summary: ${err.message}</div>`;
      }
    }

    loadRuns();
    loadSummary();
  </script>
</body>
</html>
