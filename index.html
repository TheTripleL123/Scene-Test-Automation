<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scene Test Automation</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; max-width: 95%; margin: 0 auto; padding: 32px; background: #0d1117; color: #e6edf3; font-size: 16px; }
    h1 { margin-bottom: 6px; color: #f0f6fc; font-size: 1.8em; }
    .subtitle { color: #7d8590; margin-bottom: 28px; font-size: 1em; }

    .run { background: #161b22; border: 1px solid #30363d; border-radius: 10px; padding: 20px 24px; margin-bottom: 14px; display: flex; justify-content: space-between; align-items: center; gap: 24px; flex-wrap: wrap; }
    .run-left { flex: 1; min-width: 0; }
    .run-title { font-weight: 700; font-size: 1.15em; color: #f0f6fc; margin-bottom: 10px; }
    .files { display: flex; gap: 10px; flex-wrap: wrap; }
    .file-link { display: inline-block; padding: 6px 14px; background: #1c2333; border: 1px solid #3b4c6b; border-radius: 6px; color: #79c0ff; text-decoration: none; font-size: 0.9em; cursor: pointer; }
    .file-link:hover { background: #2d3a54; }
    .file-link.drive { background: #122117; border-color: #2ea04f; color: #56d364; }
    .file-link.drive:hover { background: #1a3326; }

    .gpu-box { background: #1c2333; border: 1px solid #3b4c6b; border-radius: 8px; padding: 14px 20px; text-align: center; flex-shrink: 0; }
    .gpu-label { font-size: 0.8em; color: #7d8590; margin-bottom: 4px; }
    .gpu-value { font-family: monospace; font-size: 1.4em; color: #79c0ff; font-weight: 700; }

    .loading { color: #7d8590; padding: 40px 0; text-align: center; font-size: 1em; }
    .error { color: #f85149; padding: 16px; background: #2d1215; border: 1px solid #f8514933; border-radius: 8px; font-size: 0.9em; }
    .empty { color: #7d8590; padding: 30px 0; text-align: center; font-style: italic; }

    /* Popup overlay */
    .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1000; justify-content: center; align-items: center; cursor: pointer; }
    .overlay.active { display: flex; }
    .overlay img { max-width: 90%; max-height: 90%; border-radius: 8px; cursor: default; }
    .overlay-close { position: fixed; top: 20px; right: 30px; color: #fff; font-size: 2em; cursor: pointer; z-index: 1001; }

    @media (max-width: 700px) {
      .run { flex-direction: column; align-items: flex-start; }
      .gpu-box { width: 100%; }
    }
  </style>
</head>
<body>
  <h1>Scene Test Automation</h1>
  <p class="subtitle">Test results dashboard</p>
  <div id="content"><p class="loading">Loading...</p></div>

  <!-- Image popup -->
  <div class="overlay" id="overlay" onclick="closePopup()">
    <span class="overlay-close" onclick="closePopup()">&times;</span>
    <img id="popup-img" src="" alt="Graph" onclick="event.stopPropagation()">
  </div>

  <script>
    const REPO_OWNER = "TheTripleL123";
    const REPO_NAME = "Scene-Test-Automation";
    const BRANCH = "main";

    const API_BASE = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents`;
    const RAW = `https://raw.githubusercontent.com/${REPO_OWNER}/${REPO_NAME}/${BRANCH}`;

    function openPopup(url) {
      document.getElementById("popup-img").src = url;
      document.getElementById("overlay").classList.add("active");
    }

    function closePopup() {
      document.getElementById("overlay").classList.remove("active");
      document.getElementById("popup-img").src = "";
    }

    document.addEventListener("keydown", function(e) {
      if (e.key === "Escape") closePopup();
    });

    function forceDownload(url, filename) {
      fetch(url)
        .then(res => res.blob())
        .then(blob => {
          const a = document.createElement("a");
          a.href = URL.createObjectURL(blob);
          a.download = filename;
          a.click();
          URL.revokeObjectURL(a.href);
        })
        .catch(err => alert("Download failed: " + err.message));
    }

    async function load() {
      const container = document.getElementById("content");

      // Load summary
      let summaryEntries = [];
      try {
        const sRes = await fetch(`${RAW}/summary.json?t=${Date.now()}`);
        if (sRes.ok) {
          const text = await sRes.text();
          const trimmed = text.trim();
          if (trimmed && trimmed !== "[]") {
            summaryEntries = JSON.parse(trimmed);
          }
        }
      } catch (e) {}

      // Load run folders
      try {
        const res = await fetch(`${API_BASE}/AllTestRuns?ref=${BRANCH}`);
        if (res.status === 404) {
          container.innerHTML = '<p class="empty">No test runs yet.</p>';
          return;
        }
        if (!res.ok) throw new Error(`API returned ${res.status}`);
        const items = await res.json();

        const folders = items.filter(item => item.type === "dir");
        folders.sort((a, b) => b.name.localeCompare(a.name));

        if (folders.length === 0) {
          container.innerHTML = '<p class="empty">No test runs yet.</p>';
          return;
        }

        let html = "";
        for (const folder of folders) {
          const filesRes = await fetch(folder.url);
          const files = await filesRes.json();

          const summaryEntry = summaryEntries.find(e => e.name === folder.name);
          const driveLink = summaryEntry ? summaryEntry.drive_link : null;
          const avgGpu = summaryEntry ? summaryEntry.avg_gpu : "—";

          html += `<div class="run">`;
          html += `<div class="run-left">`;
          html += `<div class="run-title">${folder.name}</div>`;
          html += `<div class="files">`;

          for (const file of files) {
            const rawUrl = `${RAW}/AllTestRuns/${encodeURIComponent(folder.name)}/${file.name}`;
            if (file.name.endsWith(".csv")) {
              html += `<a class="file-link" href="#" onclick="forceDownload('${rawUrl}', '${file.name}'); return false;">📊 CSV Report</a>`;
            } else if (file.name.endsWith(".png")) {
              html += `<a class="file-link" href="#" onclick="openPopup('${rawUrl}'); return false;">🖼️ GPU Graph</a>`;
            }
          }
          if (driveLink) {
            html += `<a class="file-link drive" href="${driveLink}" target="_blank">🎬 Recording (Drive)</a>`;
          }
          html += `</div>`;
          html += `</div>`;

          html += `<div class="gpu-box">`;
          html += `<div class="gpu-label">Average GPU</div>`;
          html += `<div class="gpu-value">${avgGpu}</div>`;
          html += `</div>`;

          html += `</div>`;
        }

        container.innerHTML = html;
      } catch (err) {
        container.innerHTML = `<div class="error">Failed to load: ${err.message}</div>`;
      }
    }

    load();
  </script>
</body>
</html>
